services:
  tempa-daemon:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8787:8787"
    env_file:
      - .env
    environment:
      TEMPA_BIND_HOST: "0.0.0.0"
      EVOLUTION_API_URL: http://evolution-api:8080
      TEMPA_WEBHOOK_BASE_URL: http://tempa-daemon:8787
      TEMPA_MEET_DELEGATE_TO_WORKER: "true"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./src:/app/src
      - ./dashboard/dist:/app/dashboard/dist
    depends_on:
      evolution-api:
        condition: service_started
      meet-worker:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  meet-worker:
    build:
      context: .
      dockerfile: Dockerfile.meet-worker
    restart: unless-stopped
    command: ["/usr/local/bin/meet-worker-entrypoint.sh"]
    env_file:
      - .env
    environment:
      TEMPA_MEET_WORKER_POLL_SECONDS: "3"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./src:/app/src
      - ./scripts/meet-worker-entrypoint.sh:/usr/local/bin/meet-worker-entrypoint.sh:ro

  evolution-api:
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-tempa-evolution-key}
      SERVER_URL: http://localhost:8080
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@postgres:5432/evolution?schema=public
      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  evolution_instances:
  postgres_data:
